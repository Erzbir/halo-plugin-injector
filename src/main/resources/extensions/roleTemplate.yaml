apiVersion: v1alpha1
kind: Role
metadata:
  name: role-template-injector-view
  labels:
    halo.run/role-template: "true"
  annotations:
    rbac.authorization.halo.run/module: "Injector Management"
    rbac.authorization.halo.run/display-name: "代码注入查看"
    rbac.authorization.halo.run/ui-permissions: |
      ["plugin:injector:view"]
rules:
  - apiGroups: [ "injector.halo.run" ]
    resources: [ "pushLogs" , "pushUniques" ]
    verbs: [ "get", "list" ]
---
apiVersion: v1alpha1
kind: Role
metadata:
  name: role-template-injector-manage
  labels:
    halo.run/role-template: "true"
  annotations:
    rbac.authorization.halo.run/module: "Injector Management"
    rbac.authorization.halo.run/display-name: "代码注入管理"
    rbac.authorization.halo.run/ui-permissions: |
      ["plugin:injector:manage"]
    rbac.authorization.halo.run/dependencies: |
      ["role-template-injector-view"]
rules:
  - apiGroups: [ "injector.halo.run" ]
    resources: [ "pushLogs" , "pushUniques" ]
    verbs: [ "create", "patch", "update", "delete", "deletecollection" ]